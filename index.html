<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HY CAR | Location de Voitures</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d15;
            color: #eef2ff;
        }

        /* Header Élégant */
        header {
            background: #07090f;
            border-bottom: 1px solid #1e2a3a;
            padding: 0.9rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo .hy {
            color: #ffffff;
        }

        .logo .car {
            color: #2d7aff;
        }

        .logo small {
            font-size: 0.65rem;
            color: #7e8a98;
            font-weight: 400;
            display: block;
            line-height: 1.2;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #ccd6f0;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #2d7aff;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
        }

        /* Layout principal : Sidebar (filtres + recherche) + Grille */
        .main-layout {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: flex;
            gap: 2rem;
        }

        /* Sidebar Élégante */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: #0f121c;
            border-radius: 24px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 90px;
            border: 1px solid #1f2a3e;
        }

        .sidebar h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #2d7aff;
            letter-spacing: -0.2px;
        }

        .search-box {
            margin-bottom: 2rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #080b12;
            border: 1px solid #253040;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
        }

        .search-box input:focus {
            border-color: #2d7aff;
        }

        .filter-group {
            margin-bottom: 1.8rem;
        }

        .filter-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            padding: 0.6rem 0;
            color: #b9c3d4;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 8px;
        }

        .filter-btn i {
            width: 24px;
            margin-right: 8px;
            color: #5c6f87;
        }

        .filter-btn.active, .filter-btn:hover {
            color: white;
            background: #1a2538;
            padding-left: 8px;
        }

        .filter-btn.active i, .filter-btn:hover i {
            color: #2d7aff;
        }

        /* Map link élégant */
        .map-link {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #1f2a3e;
        }

        .map-link a {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #2d7aff;
            font-weight: 500;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .map-link a:hover {
            gap: 14px;
            color: #5c9eff;
        }

        /* Grille des voitures */
        .cars-section {
            flex: 1;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .cars-count {
            font-size: 0.8rem;
            color: #7e8a98;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Carte voiture -- noire/bleue élégante */
        .car-card {
            background: #0f121c;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.25s ease;
            border: 1px solid #1f2a3e;
        }

        .car-card:hover {
            transform: translateY(-4px);
            border-color: #2d7aff;
            box-shadow: 0 10px 25px -10px rgba(45, 122, 255, 0.2);
        }

        .car-img {
            height: 190px;
            background-color: #0a0d14;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .car-img-placeholder {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d111a;
            color: #2d3a4e;
        }

        .car-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 0.5px solid rgba(45,122,255,0.5);
        }

        .car-info {
            padding: 1.2rem;
        }

        .car-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .car-type {
            font-size: 0.7rem;
            color: #2d7aff;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 0.6rem;
        }

        .car-details {
            display: flex;
            gap: 1rem;
            margin: 0.8rem 0;
            color: #9aa9bb;
            font-size: 0.75rem;
        }

        .car-details i {
            margin-right: 0.2rem;
            color: #2d7aff;
        }

        .price {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
        }

        .price span {
            font-size: 0.7rem;
            font-weight: normal;
            color: #7e8a98;
        }

        .book-btn {
            display: block;
            background: #1e2a3a;
            border: none;
            width: 100%;
            padding: 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }

        .book-btn:hover {
            background: #2d7aff;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0f121c;
            border: 1px solid #2a3649;
            max-width: 450px;
            width: 90%;
            border-radius: 28px;
            padding: 1.8rem;
        }

        .close-modal {
            float: right;
            font-size: 1.3rem;
            cursor: pointer;
            color: #8f9bb3;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            font-size: 0.8rem;
            color: #b9c7da;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem;
            background: #080b12;
            border: 1px solid #253040;
            border-radius: 16px;
            color: white;
            outline: none;
        }

        .submit-booking {
            background: #2d7aff;
            border: none;
            width: 100%;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: 700;
            margin-top: 0.8rem;
            cursor: pointer;
            color: white;
        }

        footer {
            text-align: center;
            padding: 1.8rem;
            color: #5a6a7e;
            font-size: 0.75rem;
            border-top: 1px solid #121824;
            margin-top: 2rem;
        }

        @media (max-width: 850px) {
            .main-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                position: static;
                display: flex;
                flex-wrap: wrap;
                gap: 1rem;
                align-items: center;
            }
            .search-box, .filter-group, .map-link {
                flex: 1;
                margin-bottom: 0;
            }
            .filter-group .filter-btn {
                display: inline-block;
                width: auto;
                margin-right: 0.8rem;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                text-align: center;
                padding: 1rem 0;
            }
            .nav-links.show {
                display: flex;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">
            <h1><span class="hy">HY</span><span class="car">CAR</span></h1>
            <small>by Haytam & Yassmin</small>
        </div>
        <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#" data-nav="home">Accueil</a></li>
        </ul>
    </div>
</header>

<div class="main-layout">
    <!-- Sidebar avec recherche & filtres + map -->
    <aside class="sidebar">
        <div class="search-box">
            <h3><i class="fas fa-search"></i> Recherche</h3>
            <input type="text" id="searchInput" placeholder="Nom de voiture ...">
        </div>
        <div class="filter-group">
            <h3><i class="fas fa-filter"></i> Catégories</h3>
            <button class="filter-btn active" data-filter="all"><i class="fas fa-car"></i> Toutes</button>
            <button class="filter-btn" data-filter="Economique"><i class="fas fa-leaf"></i> Économique</button>
            <button class="filter-btn" data-filter="SUV"><i class="fas fa-truck"></i> SUV</button>
            <button class="filter-btn" data-filter="Luxe"><i class="fas fa-gem"></i> Luxe</button>
        </div>
        <div class="map-link">
            <h3><i class="fas fa-map-pin"></i> Notre agence</h3>
            <a href="https://www.google.com/maps?q=maroc+casablanca+location+voiture" target="_blank">
                <i class="fas fa-map-marker-alt"></i> Voir sur Google Maps
                <i class="fas fa-external-link-alt" style="font-size: 0.7rem;"></i>
            </a>
        </div>
    </aside>

    <section class="cars-section">
        <div class="section-header">
            <h2>🚘 Nos véhicules</h2>
            <span class="cars-count" id="carsCount">0 modèles</span>
        </div>
        <div class="cars-grid" id="carsGrid"></div>
    </section>
</div>

<footer>
    <p>HY CAR © 2025 — Location de confiance | Haytam & Yassmin</p>
</footer>

<!-- Modal Réservation -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3 style="margin-bottom: 1rem;">📄 Réservation rapide</h3>
        <form id="bookingForm">
            <input type="hidden" id="carId">
            <div class="form-group">
                <label>Voiture</label>
                <input type="text" id="modalCarName" readonly>
            </div>
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" id="customerName" required placeholder="Haytam / Yassmin">
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="tel" id="customerPhone" required placeholder="+212 6XXXXXXXX">
            </div>
            <div class="form-group">
                <label>Date de début</label>
                <input type="date" id="startDate" required>
            </div>
            <div class="form-group">
                <label>Date de fin</label>
                <input type="date" id="endDate" required>
            </div>
            <button type="submit" class="submit-booking"><i class="fab fa-whatsapp"></i> Confirmer & WhatsApp</button>
        </form>
    </div>
</div>

<script>
    // === LES VOITURES ===
    // TU REMPLACES LES IMAGES PAR TES PHOTOS (met le chemin ou URL)
    const cars = [
        { id: 1, name: "Mercedes Classe C", type: "Luxe", pricePerDay: 950, image: "", fuel: "Essence", seats: 5, badge: "Luxe" },
        { id: 2, name: "Dacia Sandero", type: "Economique", pricePerDay: 250, image: "", fuel: "Essence", seats: 5, badge: "Éco" },
        { id: 3, name: "BMW X5", type: "SUV", pricePerDay: 1400, image: "", fuel: "Diesel", seats: 5, badge: "SUV" },
        { id: 4, name: "Renault Clio", type: "Economique", pricePerDay: 270, image: "", fuel: "Essence", seats: 5, badge: "Éco" },
        { id: 5, name: "Audi A6", type: "Luxe", pricePerDay: 1200, image: "", fuel: "Essence", seats: 5, badge: "Luxe" },
        { id: 6, name: "Hyundai Tucson", type: "SUV", pricePerDay: 680, image: "", fuel: "Diesel", seats: 5, badge: "SUV" }
    ];

    // Pas de réservations affichées, mais on garde le système simple pour l'usage
    function sendWhatsApp(booking) {
        let phone = booking.customerPhone.replace(/\D/g, '');
        if (!phone.startsWith('212')) phone = '212' + phone.replace(/^0+/, '');
        const msg = `Bonjour HY CAR! 👋\nNouvelle réservation :\n🚗 ${booking.carName}\n📅 Du ${booking.startDate} au ${booking.endDate} (${booking.totalDays}j)\n💰 Total: ${booking.totalPrice} DH\n👤 ${booking.customerName}\n📞 ${booking.customerPhone}\nMerci de confirmer.`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // Rendu des voitures
    function renderCars(filter = "all", search = "") {
        let filtered = cars.filter(c => filter === "all" || c.type === filter);
        if (search.trim()) filtered = filtered.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
        const grid = document.getElementById("carsGrid");
        const countSpan = document.getElementById("carsCount");
        if (!grid) return;
        countSpan.innerText = filtered.length + " modèle" + (filtered.length > 1 ? "s" : "");
        if (filtered.length === 0) {
            grid.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:2rem;'>Aucune voiture trouvée</p>";
            return;
        }
        grid.innerHTML = filtered.map(car => {
            const imgStyle = car.image ? `background-image: url('${car.image}'); background-size:cover; background-position:center;` : '';
            const placeholderHtml = !car.image ? `<div class="car-img-placeholder"><i class="fas fa-car" style="font-size:2rem; opacity:0.3;"></i><br><span style="font-size:0.7rem;">ajoutez votre photo</span></div>` : '';
            return `
            <div class="car-card">
                <div class="car-img" style="${imgStyle}">
                    ${placeholderHtml}
                    <div class="car-badge">${car.badge}</div>
                </div>
                <div class="car-info">
                    <div class="car-title">${car.name}</div>
                    <div class="car-type">${car.type}</div>
                    <div class="car-details">
                        <span><i class="fas fa-gas-pump"></i> ${car.fuel}</span>
                        <span><i class="fas fa-users"></i> ${car.seats} places</span>
                        <span><i class="fas fa-cog"></i> Auto</span>
                    </div>
                    <div class="price">${car.pricePerDay} <span>DH/jour</span></div>
                    <button class="book-btn" data-id="${car.id}" data-name="${car.name}" data-price="${car.pricePerDay}">📅 Réserver</button>
                </div>
            </div>`;
        }).join('');

        document.querySelectorAll('.book-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const name = btn.dataset.name;
                const price = parseInt(btn.dataset.price);
                openModal(id, name, price);
            });
        });
    }

    function openModal(carId, carName, pricePerDay) {
        document.getElementById("modalCarName").value = carName;
        document.getElementById("carId").value = carId;
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const later = new Date();
        later.setDate(later.getDate() + 3);
        document.getElementById("startDate").value = tomorrow.toISOString().split('T')[0];
        document.getElementById("endDate").value = later.toISOString().split('T')[0];
        document.getElementById("customerName").value = "";
        document.getElementById("customerPhone").value = "";
        document.getElementById("bookingModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("bookingModal").style.display = "none";
    }

    document.getElementById("bookingForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const carId = parseInt(document.getElementById("carId").value);
        const carName = document.getElementById("modalCarName").value;
        const customerName = document.getElementById("customerName").value.trim();
        const customerPhone = document.getElementById("customerPhone").value.trim();
        const startDate = document.getElementById("startDate").value;
        const endDate = document.getElementById("endDate").value;
        if (!customerName || !customerPhone || !startDate || !endDate) {
            alert("Veuillez remplir tous les champs");
            return;
        }
        const car = cars.find(c => c.id === carId);
        if (!car) return;
        const days = Math.ceil((new Date(endDate) - new Date(startDate)) / (1000 * 3600 * 24));
        if (days <= 0) {
            alert("Date invalide");
            return;
        }
        const total = days * car.pricePerDay;
        const bookingData = {
            carName, customerName, customerPhone, startDate, endDate, totalDays: days, totalPrice: total
        };
        sendWhatsApp(bookingData);
        alert(`✅ Demande envoyée sur WhatsApp ! Total: ${total} DH`);
        closeModal();
    });

    // Filtres, recherche
    let currentFilter = "all";
    let currentSearch = "";

    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            renderCars(currentFilter, currentSearch);
        });
    });

    document.getElementById("searchInput").addEventListener("input", (e) => {
        currentSearch = e.target.value;
        renderCars(currentFilter, currentSearch);
    });

    // modal close
    document.querySelector(".close-modal").addEventListener("click", closeModal);
    window.onclick = (e) => { if (e.target === document.getElementById("bookingModal")) closeModal(); };

    // dates min
    const today = new Date();
    today.setDate(today.getDate() + 1);
    document.getElementById("startDate").min = today.toISOString().split('T')[0];
    document.getElementById("endDate").min = today.toISOString().split('T')[0];

    // navigation simple (pas d'historique ni de réservations affichées)
    document.getElementById("menuToggle").addEventListener("click", () => {
        document.getElementById("navLinks").classList.toggle("show");
    });

    renderCars("all", "");
</script>
</body>
</html>
