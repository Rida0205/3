<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HY CAR | Location de Voitures</title>
    <!-- Favicon inline via emoji + fallback -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='50%' text-anchor='middle' dy='.35em' font-size='70' fill='%232d7aff'>🚗</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1d24;
            color: #eef2ff;
        }

        /* Header élégant */
        header {
            background: #13161d;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2d3340;
        }

        .nav-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h1 {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .logo .hy { color: #fff; }
        .logo .car { color: #2d7aff; }
        .logo small {
            font-size: 0.65rem;
            color: #8e9aaf;
            display: block;
        }

        /* Layout principal */
        .main-layout {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: flex;
            gap: 2rem;
        }

        /* Sidebar */
        .sidebar {
            width: 270px;
            flex-shrink: 0;
            background: #13161d;
            border-radius: 24px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 90px;
            border: 1px solid #2d3340;
        }
        .sidebar h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #2d7aff;
        }
        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0e1017;
            border: 1px solid #2d3340;
            border-radius: 40px;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
        }
        .search-box input:focus { border-color: #2d7aff; }
        .map-link {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #2d3340;
        }
        .map-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2d7aff;
            text-decoration: none;
            font-size: 0.85rem;
            background: #1e232c;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            transition: 0.2s;
        }
        .map-link a:hover { background: #2d7aff20; gap: 12px; }

        /* Grille voitures */
        .cars-section { flex: 1; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }
        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #2d7aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .cars-count {
            font-size: 0.75rem;
            background: #2d7aff20;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.8rem;
        }

        /* Carte voiture moderne */
        .car-card {
            background: #13161d;
            border-radius: 24px;
            overflow: hidden;
            transition: 0.25s ease;
            border: 1px solid #2d3340;
        }
        .car-card:hover {
            transform: translateY(-4px);
            border-color: #2d7aff;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.4);
        }
        .car-img {
            height: 190px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .car-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            border: 0.5px solid #2d7aff;
        }
        .car-info { padding: 1.2rem; }
        .car-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .car-details {
            display: flex;
            gap: 1rem;
            margin: 0.8rem 0;
            color: #9aa5bb;
            font-size: 0.7rem;
        }
        .car-details i { margin-right: 0.2rem; color: #2d7aff; }
        .price {
            font-size: 1.3rem;
            font-weight: 800;
        }
        .price span { font-size: 0.65rem; font-weight: normal; color: #8e9aaf; }
        .book-btn {
            background: #1e232c;
            border: none;
            width: 100%;
            padding: 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .book-btn:hover { background: #2d7aff; }

        /* Partenaires - icônes élégantes */
        .partners {
            background: #13161d;
            border-top: 1px solid #2d3340;
            border-bottom: 1px solid #2d3340;
            padding: 1.8rem 0;
            margin: 2rem 0 0;
        }
        .partners h3 {
            text-align: center;
            font-size: 0.9rem;
            color: #8e9aaf;
            letter-spacing: 1px;
            margin-bottom: 1.2rem;
        }
        .scrolling-logos {
            display: flex;
            gap: 3rem;
            animation: scrollLogos 20s linear infinite;
            width: fit-content;
        }
        .scrolling-logos i {
            font-size: 2rem;
            color: #5a6b8a;
            transition: 0.2s;
        }
        .scrolling-logos i:hover { color: #2d7aff; transform: scale(1.1); }
        .logo-track {
            overflow: hidden;
            white-space: nowrap;
        }
        @keyframes scrollLogos {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #13161d;
            border: 1px solid #2d7aff;
            max-width: 450px;
            width: 90%;
            border-radius: 28px;
            padding: 1.8rem;
        }
        .close-modal {
            float: right;
            font-size: 1.3rem;
            cursor: pointer;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            font-size: 0.75rem;
            color: #9aa5bb;
            display: block;
            margin-bottom: 0.3rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem;
            background: #0e1017;
            border: 1px solid #2d3340;
            border-radius: 16px;
            color: white;
            outline: none;
        }
        .form-group input:focus { border-color: #2d7aff; }
        .submit-booking {
            background: #2d7aff;
            width: 100%;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            color: white;
            margin-top: 0.5rem;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.7rem;
            color: #6a7a90;
        }

        @media (max-width: 780px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">
            <h1><span class="hy">HY</span><span class="car">CAR</span></h1>
            <small>by Haytam & Yassmin</small>
        </div>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar">
        <div class="search-box">
            <h3><i class="fas fa-search"></i> Chercher</h3>
            <input type="text" id="searchInput" placeholder="Range, Audi, BMW ...">
        </div>
        <div class="map-link">
            <h3><i class="fas fa-map-marker-alt"></i> Agence</h3>
            <a href="https://www.google.com/maps?q=maroc+casablanca+location+voiture" target="_blank">
                <i class="fas fa-location-dot"></i> Google Maps
            </a>
        </div>
    </aside>

    <section class="cars-section">
        <div class="section-header">
            <h2>🚘 Nos véhicules</h2>
            <span class="cars-count" id="carsCount">0 modèles</span>
        </div>
        <div class="cars-grid" id="carsGrid"></div>
    </section>
</div>

<!-- Partenaires avec icônes Fontawesome (visibles 100%) -->
<div class="partners">
    <h3><i class="fas fa-handshake"></i> Nos partenaires constructeurs</h3>
    <div class="logo-track">
        <div class="scrolling-logos" id="logoSlider">
            <i class="fab fa-windows"></i> <!-- Mercedes style -->
            <i class="fas fa-car"></i>
            <i class="fas fa-truck"></i>
            <i class="fas fa-car-side"></i>
            <i class="fas fa-gas-pump"></i>
            <i class="fab fa-battle-net"></i>
            <i class="fas fa-caravan"></i>
            <!-- répétition -->
            <i class="fab fa-windows"></i>
            <i class="fas fa-car"></i>
            <i class="fas fa-truck"></i>
            <i class="fas fa-car-side"></i>
        </div>
    </div>
</div>

<footer>
    <p>HY CAR © 2025 — Location premium | <i class="fab fa-whatsapp"></i> Réservation WhatsApp | <i class="fas fa-shield-alt"></i> Confiance & élégance</p>
</footer>

<!-- Modal -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3 style="margin-bottom: 1rem; color:#2d7aff;">📄 Réservation</h3>
        <form id="bookingForm">
            <input type="hidden" id="carId">
            <div class="form-group"><label>Voiture</label><input type="text" id="modalCarName" readonly></div>
            <div class="form-group"><label>Nom complet</label><input type="text" id="customerName" required></div>
            <div class="form-group"><label>WhatsApp</label><input type="tel" id="customerPhone" required placeholder="+212 6XXXXXXXX"></div>
            <div class="form-group"><label>Début</label><input type="date" id="startDate" required></div>
            <div class="form-group"><label>Fin</label><input type="date" id="endDate" required></div>
            <button type="submit" class="submit-booking"><i class="fab fa-whatsapp"></i> Confirmer & WhatsApp</button>
        </form>
    </div>
</div>

<script>
    // Liste des voitures (les mêmes que vous avez demandées)
    const cars = [
        { id: 1, name: "RANGE ROVER SPORT", type: "Premium", pricePerDay: 2200, image: "https://media.production.jlrms.com/styles/thumbnail_big/s3/2020-07-14/image/3a524bd8-34d7-40f0-a547-b4f8fc4b8bdb/RRS_21MY_HSE_DYN_BLACK_150720_01.jpg?VersionId=UhbVhFfH7IKguwjb6EdnV7VUTXRS8P8W&h=b88da0f1&itok=xyCkVAC-", fuel: "Diesel", seats: 5 },
        { id: 2, name: "AUDI Q8", type: "Premium", pricePerDay: 1900, image: "https://m.atcdn.co.uk/vms/media/0d7c8f9e7fb1449d87293de87aa17d57.jpg", fuel: "Essence", seats: 5 },
        { id: 3, name: "Hyundai Tucson", type: "SUV", pricePerDay: 750, image: "https://autogiz.com/product_images/webp/2025-tucson-phev-limited-awd-cashmere-bronze-hero-1_Browse_1.webp", fuel: "Hybride", seats: 5 },
        { id: 4, name: "Volkswagen Touareg", type: "SUV", pricePerDay: 1100, image: "https://r-media.volkswagen.com/persisted/72d2d8e4-6063-4fad-a81f-5beccbf434d0/0.0.0/vehicle-mbt/760-2026-MYU/v1_5d4923c1be4a7a1aa81698d4849efb143697af25727a0c47fd8b9586e05f185e/custturntable4/df081e1b9a22aabf6a22ff62efcbacf2.png", fuel: "Diesel", seats: 5 },
        { id: 5, name: "Mercedes Vito", type: "Utilitaire", pricePerDay: 850, image: "https://images.autouncle.com/da/car_images/eb7c7b68-a877-4ee6-8bff-f33ba145a125_2019-mercedes-vito-163.jpg", fuel: "Diesel", seats: 8 },
        { id: 6, name: "BMW SERIE 5", type: "Premium", pricePerDay: 1300, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/BMW_G60_520d_IAA_2023_1X7A0757.jpg/960px-BMW_G60_520d_IAA_2023_1X7A0757.jpg", fuel: "Essence", seats: 5 }
    ];

    function sendWhatsApp(booking) {
        let phone = booking.customerPhone.replace(/\D/g, '');
        if (!phone.startsWith('212')) phone = '212' + phone.replace(/^0+/, '');
        const msg = `Bonjour HY CAR! 👋\nRéservation :\n🚗 ${booking.carName}\n📅 ${booking.startDate} au ${booking.endDate} (${booking.totalDays}j)\n💰 ${booking.totalPrice} DH\n👤 ${booking.customerName}\n📞 ${booking.customerPhone}`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function renderCars(search = "") {
        let filtered = cars.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
        const grid = document.getElementById("carsGrid");
        const counter = document.getElementById("carsCount");
        counter.innerText = filtered.length + " modèle" + (filtered.length > 1 ? "s" : "");
        if(filtered.length === 0){
            grid.innerHTML = "<p style='text-align:center; grid-column:1/-1;'>Aucun véhicule trouvé</p>";
            return;
        }
        grid.innerHTML = filtered.map(car => `
            <div class="car-card">
                <div class="car-img" style="background-image: url('${car.image}'); background-size: cover; background-position: center;">
                    <div class="car-badge">${car.type}</div>
                </div>
                <div class="car-info">
                    <div class="car-title">${car.name}</div>
                    <div class="car-details">
                        <span><i class="fas fa-gas-pump"></i> ${car.fuel}</span>
                        <span><i class="fas fa-users"></i> ${car.seats} places</span>
                        <span><i class="fas fa-cog"></i> Auto</span>
                    </div>
                    <div class="price">${car.pricePerDay} <span>DH/jour</span></div>
                    <button class="book-btn" data-id="${car.id}" data-name="${car.name}" data-price="${car.pricePerDay}">📅 Réserver</button>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.book-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                openModal(parseInt(btn.dataset.id), btn.dataset.name, parseInt(btn.dataset.price));
            });
        });
    }

    function openModal(id, name, price) {
        document.getElementById("modalCarName").value = name;
        document.getElementById("carId").value = id;
        const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
        const later = new Date(); later.setDate(later.getDate()+3);
        document.getElementById("startDate").value = tomorrow.toISOString().split('T')[0];
        document.getElementById("endDate").value = later.toISOString().split('T')[0];
        document.getElementById("customerName").value = "";
        document.getElementById("customerPhone").value = "";
        document.getElementById("bookingModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("bookingModal").style.display = "none"; }

    document.getElementById("bookingForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const carId = parseInt(document.getElementById("carId").value);
        const carName = document.getElementById("modalCarName").value;
        const customerName = document.getElementById("customerName").value.trim();
        const customerPhone = document.getElementById("customerPhone").value.trim();
        const startDate = document.getElementById("startDate").value;
        const endDate = document.getElementById("endDate").value;
        if(!customerName || !customerPhone || !startDate || !endDate) return alert("Remplissez tout");
        const car = cars.find(c => c.id === carId);
        if(!car) return;
        const days = Math.ceil((new Date(endDate) - new Date(startDate)) / (1000*3600*24));
        if(days <= 0) return alert("Date invalide");
        const total = days * car.pricePerDay;
        const bookingData = { carName, customerName, customerPhone, startDate, endDate, totalDays: days, totalPrice: total };
        sendWhatsApp(bookingData);
        alert(`✅ Envoyé sur WhatsApp ! Total: ${total} DH`);
        closeModal();
    });

    document.getElementById("searchInput").addEventListener("input", (e) => renderCars(e.target.value));
    document.querySelector(".close-modal").addEventListener("click", closeModal);
    window.onclick = (e) => { if(e.target === document.getElementById("bookingModal")) closeModal(); };

    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
    document.getElementById("startDate").min = tomorrow.toISOString().split('T')[0];
    document.getElementById("endDate").min = tomorrow.toISOString().split('T')[0];

    // défilement icônes partenaires
    const track = document.getElementById("logoSlider");
    if(track) track.innerHTML = track.innerHTML + track.innerHTML;

    renderCars("");
</script>
</body>
</html>
